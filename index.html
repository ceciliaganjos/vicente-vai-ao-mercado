<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vicente Vai ao Mercado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
    }
    body {
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      font-family: 'Courier New', monospace;
    }

    /* ── Wrapper escala o canvas para caber na tela ── */
    #game-wrapper {
      position: relative;
      /* limita pela largura E pela altura disponível */
      width: min(800px, 100vw, calc(100dvh * 2));
      aspect-ratio: 2 / 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 3px solid #00ffee;
      box-shadow: 0 0 30px #00ffee55, 0 0 60px #ff00aa33;
      touch-action: none;
    }

    /* ── Botões de controle touch ── */
    #touch-controls {
      position: absolute;
      bottom: 8px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 12px;
      pointer-events: none;
    }
    #touch-controls .left-btns {
      display: flex;
      gap: 8px;
      pointer-events: all;
    }
    #touch-controls .right-btns {
      pointer-events: all;
    }
    .ctrl-btn {
      /* escala com a tela: ~9% da largura do viewport, max 70px */
      width: clamp(44px, 9vw, 70px);
      height: clamp(44px, 9vw, 70px);
      background: rgba(0, 255, 238, 0.15);
      border: 2px solid rgba(0, 255, 238, 0.5);
      border-radius: 50%;
      color: #00ffee;
      font-size: clamp(18px, 4vw, 26px);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ctrl-btn:active, .ctrl-btn.pressed {
      background: rgba(0, 255, 238, 0.35);
    }
    #btn-jump {
      background: rgba(255, 0, 170, 0.15);
      border-color: rgba(255, 0, 170, 0.5);
      color: #ff00aa;
      width: clamp(50px, 11vw, 80px);
      height: clamp(50px, 11vw, 80px);
      font-size: clamp(20px, 5vw, 30px);
    }
    #btn-jump:active, #btn-jump.pressed {
      background: rgba(255, 0, 170, 0.35);
    }

    #subtitle {
      color: #00ccbb;
      font-size: 12px;
      margin-top: 6px;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <canvas id="game" width="800" height="400"></canvas>
  <div id="touch-controls">
    <div class="left-btns">
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
    </div>
    <div class="right-btns">
      <button class="ctrl-btn" id="btn-jump">▲</button>
    </div>
  </div>
</div>
<div id="subtitle">◀ ▶ mover &nbsp;|&nbsp; ▲ pular &nbsp;|&nbsp; teclado: ← → ↑ / ESPAÇO</div>

<script>
// ─────────────────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────────────────
const W = 800, H = 400;
const GROUND_Y    = 320;   // top of ground surface
const GRAVITY     = 0.42;
const JUMP_FORCE  = -16;
const MOVE_SPEED  = 230;   // player movement speed px/s
const ENEMY_SPEED = 130;   // enemy walk speed px/s (world coords)
const WORLD_LEN   = 6000;  // total world distance
let   curWorldLen = WORLD_LEN; // atual (muda na fase 3)
const PLAYER_X    = 140;   // fixed screen X

const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

// ─────────────────────────────────────────────────────────
//  IMAGE LOADER
// ─────────────────────────────────────────────────────────
const IMG = {};
let loaded = 0, total = 0;

function loadImg(key, src) {
  total++;
  const img = new Image();
  img.onload  = () => loaded++;
  img.onerror = () => { loaded++; console.warn('Missing:', src); };
  img.src = src;
  IMG[key] = img;
}

// Player – Bridge Heroine
for (let i = 1; i <= 7; i++)
  loadImg(`run${i}`, `imagens/Characters/Bridge Heroine/Heroine base/Sprites/run/player-run-${i}.png`);
for (let i = 1; i <= 4; i++)
  loadImg(`idle${i}`, `imagens/Characters/Bridge Heroine/Heroine base/Sprites/idle/player-idle-${i}.png`);
for (let i = 1; i <= 4; i++)
  loadImg(`jump${i}`, `imagens/Characters/Bridge Heroine/Heroine base/Sprites/jump/player-jump-${i}.png`);

// Enemy – Fase 1: Punk
for (let i = 1; i <= 4; i++)
  loadImg(`punk${i}`, `imagens/Packs/Streets of Fight/Sprites/Enemy-Punk/Walk/walk${i}.png`);

// Enemy – Fase 2: Cop
for (let i = 1; i <= 10; i++)
  loadImg(`cop${i}`, `imagens/Packs/Warped City/V2/Sprites/cop/run/cop${i}.png`);

// Boss – Fase 3: Hell-Beast
for (let i = 1; i <= 6; i++)
  loadImg(`bossIdle${i}`, `imagens/Characters/Hell-Beast/Idle/hell-beast-idle${i}.png`);
for (let i = 1; i <= 4; i++)
  loadImg(`bossBreath${i}`, `imagens/Characters/Hell-Beast/Breath/hell-beast-breath${i}.png`);
for (let i = 1; i <= 3; i++)
  loadImg(`bossFire${i}`, `imagens/Characters/Hell-Beast/Fireball/frame${i}.png`);

// Environment – Fase 3: GothicVania Town
loadImg('bg3Back', 'imagens/Packs/GothicVania-town/layers/background.png');
loadImg('bg3Mid',  'imagens/Packs/GothicVania-town/layers/middleground.png');

// Environment – Fase 1: Miami Synth + Streets of Fight
loadImg('bgSky',      'imagens/Packs/Miami-synth-files/Layers/back.png');
loadImg('bgBuildings','imagens/Packs/Miami-synth-files/Layers/buildings.png');
loadImg('bgNeon',     'imagens/Packs/Streets of Fight/Stage Layers/back.png');

// Environment – Fase 2: Warped City
loadImg('bg2Back',   'imagens/Packs/Warped City/V2/Environmet/background/back.png');
loadImg('bg2Middle', 'imagens/Packs/Warped City/V2/Environmet/background/middle.png');
loadImg('bg2Front',  'imagens/Packs/Warped City/V1/warped city files/ENVIRONMENT/background/near-buildings-bg.png');

// ─────────────────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────────────────
let state    = 'loading';   // loading | title | playing | phase_clear | phase2_clear | dead | win
let phase    = 1;
let worldX   = 0;
let timer    = 0;
let phase1Time = 0;
let phase2Time = 0;
let bestTime   = null;
let lives      = 5;
let phaseTimer = 0;
let difficulty = 'medio';   // 'facil' | 'medio' | 'dificil'
let selectedDiff = 1;       // índice na lista [facil, medio, dificil]

// Boss (fase 3)
let boss = null;

const DIFF_OPTIONS = [
  { key: 'facil',    label: 'FÁCIL',    lives: 10, color: '#44ff88' },
  { key: 'medio',    label: 'MÉDIO',    lives: 5,  color: '#ffcc00' },
  { key: 'dificil',  label: 'DIFÍCIL',  lives: 3,  color: '#ff4444' },
];

// Player object
const PL = {
  y: GROUND_Y - 72,
  vy: 0,
  onGround: true,
  anim: 'idle',
  frame: 0,
  frameTick: 0,
  invincible: 0,
  width:  38,
  height: 60,
  facingLeft: false,
};

function playerTop()    { return PL.y; }
function playerBottom() { return PL.y + PL.height; }

// Obstacles
let enemies   = [];
let spawnTick = 0;
let spawnRate = 2.4;   // seconds between spawns

// Holes in ground [{wx, w}]
let holes = [];

// Coins (collectibles)
let coins = [];
let score = 0;

// Particles
let particles = [];

// Stars (background decoration)
const STARS = [];
for (let i = 0; i < 60; i++) {
  STARS.push({ x: Math.random() * W, y: Math.random() * GROUND_Y * 0.6, r: Math.random() * 1.5 + 0.3 });
}

// ─────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────
const KEYS = {};
document.addEventListener('keydown', e => {
  KEYS[e.code] = true;

  // Navegação na tela de dificuldade
  if (state === 'difficulty') {
    if (e.code === 'ArrowUp'   || e.code === 'KeyW') { selectedDiff = (selectedDiff + 2) % 3; return; }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') { selectedDiff = (selectedDiff + 1) % 3; return; }
  }

  if (['Space', 'ArrowUp', 'KeyW'].includes(e.code) && state === 'playing') {
    e.preventDefault();
    onJumpPress();
  }
  if (['Enter', 'Space'].includes(e.code)) {
    onAction();
  }
});
document.addEventListener('keyup', e => { KEYS[e.code] = false; });
canvas.addEventListener('pointerdown', e => {
  if (state === 'difficulty') {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top)  * (H / rect.height);
    for (const r of DIFF_RECTS) {
      if (mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h) {
        selectedDiff = r.idx;
        confirmDifficulty();
        return;
      }
    }
    return;
  }
  onJumpPress();
  onAction();
});

function onJumpPress() {
  if (state !== 'playing') return;
  if (PL.onGround) {
    PL.vy = JUMP_FORCE;
    PL.onGround = false;
    PL.anim = 'jump';
    PL.frame = 0;
  }
}

function onAction() {
  if (state === 'title')        { state = 'difficulty'; return; }
  if (state === 'difficulty')   { confirmDifficulty(); return; }
  if (state === 'dead')         { lives > 0 ? resumeGame() : startGame(); return; }
  if (state === 'phase_clear')  { startPhase2(); return; }
  if (state === 'phase2_clear') { startPhase3(); return; }
  if (state === 'win')          { state = 'difficulty'; return; }
}

function confirmDifficulty() {
  difficulty = DIFF_OPTIONS[selectedDiff].key;
  startGame();
}

// ─────────────────────────────────────────────────────────
//  LEVEL GENERATION
// ─────────────────────────────────────────────────────────
function makeHoles() {
  const arr = [];
  let x = 900;
  while (x < curWorldLen - 400) {
    const w = 70 + Math.random() * 60;
    arr.push({ wx: x, w });
    x += 350 + Math.random() * 350;
  }
  return arr;
}

function makeCoins() {
  const arr = [];
  // Coins appear above the path
  for (let wx = 400; wx < curWorldLen - 200; wx += 220 + Math.random() * 180) {
    const y = GROUND_Y - 80 - Math.random() * 60;
    arr.push({ wx, y, collected: false });
  }
  return arr;
}

// ─────────────────────────────────────────────────────────
//  GAME LIFECYCLE
// ─────────────────────────────────────────────────────────
function resetPlayer() {
  PL.y          = GROUND_Y - PL.height;
  PL.vy         = 0;
  PL.onGround   = true;
  PL.anim       = 'idle';
  PL.frame      = 0;
  PL.frameTick  = 0;
  PL.invincible = 0;
  PL.facingLeft = false;
}

function startGame() {
  phase      = 1;
  state      = 'playing';
  worldX     = 0;
  timer      = 0;
  phase1Time = 0;
  phase2Time = 0;
  lives      = DIFF_OPTIONS[selectedDiff].lives;
  score      = 0;
  enemies    = [];
  spawnTick  = 0;
  spawnRate  = 2.4;
  particles  = [];
  curWorldLen = WORLD_LEN;
  holes      = makeHoles();
  coins      = makeCoins();
  boss       = null;
  resetPlayer();
}

function startPhase2() {
  phase      = 2;
  state      = 'playing';
  worldX     = 0;
  timer      = 0;
  lives      = DIFF_OPTIONS[selectedDiff].lives;
  enemies    = [];
  spawnTick  = 0;
  spawnRate  = 2.0;
  particles  = [];
  curWorldLen = WORLD_LEN;
  holes      = makeHoles();
  coins      = makeCoins();
  boss       = null;
  resetPlayer();
}

function startPhase3() {
  phase      = 3;
  state      = 'playing';
  worldX     = 0;
  timer      = 0;
  lives      = DIFF_OPTIONS[selectedDiff].lives;
  score      = 0;
  enemies    = [];
  spawnTick  = 0;
  spawnRate  = 3.5;   // poucos inimigos — o boss é o perigo
  particles  = [];
  curWorldLen = 3500;
  holes      = makeHoles();
  coins      = makeCoins();
  boss       = {
    wx:          curWorldLen - 800,
    y:           GROUND_Y - 110,
    hp:          5,
    maxHp:       5,
    anim:        'idle',
    frame:       0,
    tick:        0,
    attackTimer: 3.5,
    state:       'idle',       // 'idle' | 'windup' | 'shoot'
    windupTimer: 0,
    hurtFlash:   0,
    dead:        false,
    deathTimer:  0,
    w:           80,
    h:           110,
    fireballs:   [],
  };
  resetPlayer();
}

function resumeGame() {
  // Recuar worldX até o jogador estar em chão seguro
  const safeCheck = () => {
    const plCx = worldX + PLAYER_X + PL.width / 2;
    for (const h of holes) {
      if (plCx > h.wx && plCx < h.wx + h.w) return false;
    }
    return true;
  };
  while (!safeCheck() && worldX > 0) worldX -= 10;
  worldX = Math.max(0, worldX);

  state         = 'playing';
  PL.y          = GROUND_Y - PL.height;
  PL.vy         = 0;
  PL.onGround   = true;
  PL.anim       = 'idle';
  PL.invincible = 2.5;
  PL.facingLeft = false;
  enemies       = [];
  spawnTick     = 0;
  // Limpa fireballs do boss mas mantém boss vivo
  if (boss && !boss.dead) boss.fireballs = [];
}

function killPlayer() {
  spawnParticles(PLAYER_X + PL.width / 2, PL.y + PL.height / 2, '#ff5566', 18);
  lives--;
  state = 'dead';
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 9,
      vy: -Math.random() * 9 - 1,
      life: 1.0,
      color,
      size: Math.random() * 5 + 2,
    });
  }
}

// ─────────────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  timer += dt;

  // ── Horizontal movement ───────────────────────────────
  const goRight = KEYS['ArrowRight'] || KEYS['KeyD'];
  const goLeft  = KEYS['ArrowLeft']  || KEYS['KeyA'];

  let moveDir = 0;
  if (goRight) {
    worldX += MOVE_SPEED * dt;
    moveDir = 1;
    PL.facingLeft = false;
  } else if (goLeft && worldX > 0) {
    worldX -= MOVE_SPEED * dt;
    moveDir = -1;
    PL.facingLeft = true;
  }
  worldX = Math.max(0, worldX);

  // Win / fase clear check
  const clearCondition = phase === 3 ? (worldX >= curWorldLen && boss && boss.dead) : worldX >= curWorldLen;
  if (clearCondition) {
    spawnParticles(W / 2, H / 2, '#ffcc00', 35);
    if (phase === 1) {
      phase1Time = timer;
      state = 'phase_clear';
    } else if (phase === 2) {
      phase2Time = timer;
      state = 'phase2_clear';
    } else {
      const final = phase1Time + phase2Time + timer;
      if (!bestTime || final < bestTime) bestTime = final;
      state = 'win';
    }
    return;
  }

  // Dificuldade escala com distância
  const baseRate = phase === 1 ? 2.4 : phase === 2 ? 1.8 : 3.5;
  spawnRate = Math.max(phase === 1 ? 1.0 : phase === 2 ? 0.7 : 2.0, baseRate - worldX * 0.0003);

  // ── Boss (fase 3) ─────────────────────────────────────
  if (phase === 3 && boss && !boss.dead) {
    // Animação
    boss.tick += dt;
    const bAnimSpeed = boss.anim === 'idle' ? 0.14 : 0.10;
    const bAnimCount = boss.anim === 'idle' ? 6 : 4;
    if (boss.tick > bAnimSpeed) {
      boss.tick = 0;
      boss.frame = (boss.frame + 1) % bAnimCount;
    }

    // Flash de dano
    if (boss.hurtFlash > 0) boss.hurtFlash -= dt;

    // Estado: idle → windup → shoot
    if (boss.state === 'idle') {
      boss.attackTimer -= dt;
      if (boss.attackTimer <= 0) {
        boss.state = 'windup';
        boss.anim  = 'breath';
        boss.frame = 0;
        boss.windupTimer = 1.0;
      }
    } else if (boss.state === 'windup') {
      boss.windupTimer -= dt;
      if (boss.windupTimer <= 0) {
        boss.state = 'idle';
        boss.anim  = 'idle';
        boss.frame = 0;
        boss.attackTimer = 2.2 + Math.random() * 1.5;
        // Dispara fireball
        const bSx = boss.wx - worldX;
        boss.fireballs.push({
          wx: boss.wx - 30,
          y:  boss.y + boss.h * 0.35,
          vx: -(200 + Math.random() * 80),
          frame: 0, tick: 0,
          w: 36, h: 36,
        });
      }
    }

    // Stomp: jogador pula em cima do boss
    const bSx = boss.wx - worldX;
    const stomping = !PL.onGround && PL.vy > 0
      && PLAYER_X + PL.width > bSx + 10 && PLAYER_X < bSx + boss.w - 10
      && PL.y + PL.height > boss.y && PL.y + PL.height < boss.y + boss.h * 0.45;
    if (stomping && boss.hurtFlash <= 0) {
      boss.hp--;
      boss.hurtFlash = 0.4;
      PL.vy = JUMP_FORCE * 0.7;  // ricochete
      spawnParticles(bSx + boss.w / 2, boss.y + 20, '#ff6600', 12);
      if (boss.hp <= 0) {
        boss.dead = true;
        boss.deathTimer = 1.8;
        spawnParticles(bSx + boss.w / 2, boss.y + boss.h / 2, '#ff4400', 30);
        spawnParticles(bSx + boss.w / 2, boss.y + boss.h / 2, '#ffaa00', 20);
      }
    }

    // Fireballs do boss
    for (let i = boss.fireballs.length - 1; i >= 0; i--) {
      const fb = boss.fireballs[i];
      fb.wx += fb.vx * dt;
      fb.tick += dt;
      if (fb.tick > 0.09) { fb.tick = 0; fb.frame = (fb.frame + 1) % 3; }

      const fsx = fb.wx - worldX;
      if (fsx < -60) { boss.fireballs.splice(i, 1); continue; }

      // Colisão com jogador
      if (PL.invincible <= 0) {
        const fbRight = fsx + fb.w, fbBottom = fb.y + fb.h;
        if (PLAYER_X < fbRight && PLAYER_X + PL.width > fsx
            && PL.y < fbBottom && PL.y + PL.height > fb.y) {
          boss.fireballs.splice(i, 1);
          killPlayer();
          return;
        }
      }
    }
  }

  // Countdown boss death
  if (phase === 3 && boss && boss.dead) {
    boss.deathTimer -= dt;
    // Partículas contínuas enquanto morre
    if (boss.deathTimer > 0 && Math.random() < 0.3) {
      const bSx = boss.wx - worldX;
      spawnParticles(bSx + Math.random() * boss.w, boss.y + Math.random() * boss.h, '#ff4400', 4);
    }
  }

  // ── Player physics ────────────────────────────────────
  PL.vy += GRAVITY;
  PL.y  += PL.vy;

  // Ground collision or hole?
  const plCx   = worldX + PLAYER_X + PL.width / 2;
  let overHole = false;
  for (const h of holes) {
    if (plCx > h.wx && plCx < h.wx + h.w) { overHole = true; break; }
  }

  if (!overHole && playerBottom() >= GROUND_Y) {
    PL.y        = GROUND_Y - PL.height;
    PL.vy       = 0;
    PL.onGround = true;
    if (PL.anim === 'jump') { PL.anim = moveDir !== 0 ? 'run' : 'idle'; PL.frame = 0; }
  } else {
    PL.onGround = false;
    if (PL.y > H + 80 && PL.invincible <= 0) {
      killPlayer();
      return;
    }
  }

  // ── Player animation ──────────────────────────────────
  if (PL.onGround) {
    if (PL.anim !== 'jump') {
      const nextAnim = moveDir !== 0 ? 'run' : 'idle';
      if (PL.anim !== nextAnim) { PL.anim = nextAnim; PL.frame = 0; PL.frameTick = 0; }
    }
  }

  PL.frameTick += dt;
  const animSpeeds = { run: 0.07, jump: 0.10, idle: 0.18 };
  const animCounts = { run: 7,    jump: 4,    idle: 4     };
  if (PL.frameTick > animSpeeds[PL.anim]) {
    PL.frameTick = 0;
    PL.frame = (PL.frame + 1) % animCounts[PL.anim];
  }

  if (PL.invincible > 0) PL.invincible -= dt;

  // ── Spawn enemies ─────────────────────────────────────
  spawnTick += dt;
  if (spawnTick >= spawnRate && enemies.length < 3) {
    spawnTick = 0;
    const jumping = phase === 1 ? Math.random() < 0.3 : Math.random() < 0.5;
    const isCop = phase >= 2;
    enemies.push({
      wx:        worldX + W + 64,
      y:         GROUND_Y - 56,
      vy:        jumping ? -(8 + Math.random() * 3) : 0,
      frame:     0,
      tick:      0,
      w:         48, h: 56,
      type:      isCop ? 'cop' : 'punk',
      maxFrames: isCop ? 10 : 4,
      speed:     isCop ? ENEMY_SPEED * 1.5 : ENEMY_SPEED,
    });
  }

  // ── Update enemies ────────────────────────────────────
  for (let i = enemies.length - 1; i >= 0; i--) {
    const en = enemies[i];
    en.wx -= en.speed * dt;  // enemy walks left in world space

    en.vy += GRAVITY;
    en.y  += en.vy;

    // Check if enemy is over a hole
    const enCx = en.wx - worldX + en.w / 2;  // screen center X
    let enOverHole = false;
    for (const h of holes) {
      const hs = h.wx - worldX, he = hs + h.w;
      if (enCx > hs && enCx < he) { enOverHole = true; break; }
    }

    if (!enOverHole && en.y + en.h >= GROUND_Y) {
      en.y  = GROUND_Y - en.h;
      en.vy = 0;
    }

    // Remove if fell into pit
    if (en.y > H + 60) { enemies.splice(i, 1); continue; }

    en.tick += dt;
    if (en.tick > 0.10) { en.tick = 0; en.frame = (en.frame + 1) % en.maxFrames; }

    // Screen position
    const esx = en.wx - worldX;

    // Remove if off screen (behind or far ahead — player may have backed up)
    if (esx < -200 || esx > W + 400) { enemies.splice(i, 1); continue; }

    // Collision (only from the right side of the player)
    if (PL.invincible <= 0) {
      const margin = 10;
      const px = PLAYER_X + margin, py = PL.y + margin;
      const pw = PL.width - margin * 2, ph = PL.height - margin;
      const ex = esx + 6, ey = en.y + 8, ew = en.w - 12, eh = en.h - 8;
      if (px < ex + ew && px + pw > ex && py < ey + eh && py + ph > ey) {
        enemies.splice(i, 1);
        killPlayer();
        return;
      }
    }
  }

  // ── Collect coins ─────────────────────────────────────
  for (const c of coins) {
    if (c.collected) continue;
    const cx = c.wx - worldX;
    if (Math.abs(cx - PLAYER_X) < 40 && Math.abs(c.y - PL.y) < 50) {
      c.collected = true;
      score++;
      spawnParticles(cx, c.y, '#ffee22', 6);
    }
  }

  // ── Particles ─────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx;
    p.y    += p.vy;
    p.vy   += 0.25;
    p.life -= dt * 1.8;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────────────────
function drawImg(key, x, y, scale) {
  const img = IMG[key];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x, y, img.naturalWidth * scale, img.naturalHeight * scale);
    return true;
  }
  return false;
}

function drawTiledImg(key, scrollRatio, targetH, bottomY) {
  const img = IMG[key];
  if (!img || !img.complete || !img.naturalWidth) return;
  const scale = targetH / img.naturalHeight;
  const tw    = img.naturalWidth * scale;
  const tx    = -(worldX * scrollRatio) % tw;
  const dy    = bottomY - targetH;
  for (let x = tx - tw; x < W + tw; x += tw) {
    ctx.drawImage(img, x, dy, tw, targetH);
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW – BACKGROUND
// ─────────────────────────────────────────────────────────
function drawBackground() {
  if (phase === 1) {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0,   '#120030');
    grad.addColorStop(0.5, '#2a006e');
    grad.addColorStop(1,   '#00044a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    drawTiledImg('bgSky',       0.03, GROUND_Y * 0.92, GROUND_Y);
    drawTiledImg('bgNeon',      0.12, GROUND_Y * 0.58, GROUND_Y);
    drawTiledImg('bgBuildings', 0.22, GROUND_Y * 0.50, GROUND_Y);

    for (const s of STARS) {
      const twinkle = 0.4 + 0.6 * Math.sin(Date.now() * 0.0018 + s.x);
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillStyle = s.x % 3 === 0 ? '#00ffee' : '#ff88cc';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (phase === 2) {
    // Fase 2 – Warped City: céu vermelho ameaçador
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0,   '#1a0000');
    grad.addColorStop(0.5, '#3a0010');
    grad.addColorStop(1,   '#600020');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, GROUND_Y);

    drawTiledImg('bg2Back',   0.03, GROUND_Y * 0.90, GROUND_Y);
    drawTiledImg('bg2Middle', 0.15, GROUND_Y * 0.55, GROUND_Y);
    drawTiledImg('bg2Front',  0.28, GROUND_Y * 0.42, GROUND_Y);

    // Estrelas vermelhas/laranja
    for (const s of STARS) {
      const twinkle = 0.4 + 0.6 * Math.sin(Date.now() * 0.002 + s.x);
      ctx.globalAlpha = twinkle * 0.5;
      ctx.fillStyle = s.x % 2 === 0 ? '#ff4400' : '#ff0055';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else {
    // Fase 3 – GothicVania Town: céu noturno sinistro
    const grad3 = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad3.addColorStop(0,   '#050010');
    grad3.addColorStop(0.5, '#100025');
    grad3.addColorStop(1,   '#1a0030');
    ctx.fillStyle = grad3;
    ctx.fillRect(0, 0, W, GROUND_Y);

    drawTiledImg('bg3Back', 0.04, GROUND_Y * 0.95, GROUND_Y);
    drawTiledImg('bg3Mid',  0.18, GROUND_Y * 0.65, GROUND_Y);

    // Estrelas roxas/brancas
    for (const s of STARS) {
      const twinkle = 0.4 + 0.6 * Math.sin(Date.now() * 0.0015 + s.x);
      ctx.globalAlpha = twinkle * 0.7;
      ctx.fillStyle = s.x % 3 === 0 ? '#cc88ff' : s.x % 3 === 1 ? '#ffffff' : '#ff88ff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW – GROUND
// ─────────────────────────────────────────────────────────
function drawGround() {
  // Void/sewer below
  ctx.fillStyle = '#05000f';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // Build solid segments (excluding holes)
  let segs = [{ s: 0, e: W }];
  for (const h of holes) {
    const hs = h.wx - worldX;
    const he = hs + h.w;
    if (he < 0 || hs > W) continue;
    const next = [];
    for (const seg of segs) {
      if (hs > seg.s) next.push({ s: seg.s, e: Math.min(hs, seg.e) });
      if (he < seg.e) next.push({ s: Math.max(he, seg.s), e: seg.e });
    }
    segs = next;
  }

  const scrollOff = worldX % 80;

  for (const seg of segs) {
    if (seg.e <= seg.s) continue;
    const x = seg.s, w = seg.e - seg.s;

    const isPhase2 = phase === 2;
    const isPhase3 = phase === 3;

    if (isPhase3) {
      // ── Pedra gótica ─────────────────────────────────
      ctx.fillStyle = '#2a1f3d';
      ctx.fillRect(x, GROUND_Y, w, 18);
      ctx.fillStyle = '#1e1428';
      for (let tx = x - (scrollOff % 50); tx < x + w; tx += 50) {
        ctx.fillRect(tx, GROUND_Y, 2, 18);
      }
      ctx.fillRect(x, GROUND_Y + 8, w, 1);
      // Borda de pedra
      ctx.fillStyle = '#7a44bb';
      ctx.fillRect(x, GROUND_Y + 17, w, 3);
      // Chão de pedra escura
      ctx.fillStyle = '#150f20';
      ctx.fillRect(x, GROUND_Y + 20, w, H - GROUND_Y - 20);
      // Veios de pedra
      ctx.fillStyle = '#221830';
      for (let tx = x - (scrollOff % 60); tx < x + w; tx += 60) {
        ctx.fillRect(tx, GROUND_Y + 20, 1, H - GROUND_Y - 20);
      }
      // Brilho arcano roxo na borda
      const glow3 = 0.4 + 0.3 * Math.sin(Date.now() * 0.003 + x * 0.01);
      ctx.fillStyle = `rgba(160, 60, 255, ${glow3 * 0.35})`;
      ctx.fillRect(x, GROUND_Y + 20, w, 4);
    } else {
      // ── Calçada (topo, 18px) ──────────────────────────
      ctx.fillStyle = isPhase2 ? '#3a2020' : '#5a5a72';
      ctx.fillRect(x, GROUND_Y, w, 18);

      ctx.fillStyle = isPhase2 ? '#2a1010' : '#3a3a50';
      for (let tx = x - (scrollOff % 40); tx < x + w; tx += 40) {
        ctx.fillRect(tx, GROUND_Y, 1, 18);
      }
      ctx.fillRect(x, GROUND_Y + 9, w, 1);

      // Meio-fio
      ctx.fillStyle = isPhase2 ? '#cc3333' : '#cccccc';
      ctx.fillRect(x, GROUND_Y + 17, w, 3);

      // ── Asfalto ───────────────────────────────────────
      ctx.fillStyle = isPhase2 ? '#1a1010' : '#2a2a35';
      ctx.fillRect(x, GROUND_Y + 20, w, H - GROUND_Y - 20);

      // Faixa central
      const dashLen = 36, dashGap = 24, dashY = GROUND_Y + 48;
      ctx.fillStyle = isPhase2 ? '#aa0000' : '#aaaa00';
      for (let tx = x - (scrollOff % (dashLen + dashGap)); tx < x + w; tx += dashLen + dashGap) {
        const dx = Math.max(tx, x);
        const dw2 = Math.min(tx + dashLen, x + w) - dx;
        if (dw2 > 0) ctx.fillRect(dx, dashY, dw2, 4);
      }

      // Faixa lateral superior
      ctx.fillStyle = isPhase2 ? '#552222' : '#555566';
      ctx.fillRect(x, GROUND_Y + 20, w, 2);
    }
  }

  // Holes – glowing orange (open manhole / construction)
  for (const h of holes) {
    const hs = h.wx - worldX;
    const he = hs + h.w;
    if (he < 0 || hs > W) continue;

    // Orange glow edges
    const glow = 0.6 + 0.4 * Math.sin(Date.now() * 0.005);
    ctx.fillStyle = `rgba(255, 140, 0, ${glow})`;
    ctx.fillRect(Math.max(0, hs) - 3, GROUND_Y, 5, 14);
    ctx.fillRect(Math.min(W, he) - 2, GROUND_Y, 5, 14);

    // Pit depth gradient
    const pitGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    pitGrad.addColorStop(0, 'rgba(255, 80, 0, 0.2)');
    pitGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pitGrad;
    ctx.fillRect(Math.max(0, hs), GROUND_Y, Math.min(W, he) - Math.max(0, hs), H - GROUND_Y);
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW – MARKET (goal)
// ─────────────────────────────────────────────────────────
function drawMarket(sx) {
  const bw = 240, bh = 200;
  const bx = sx, by = GROUND_Y - bh;

  // Building body – concrete modern
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(bx, by, bw, bh);

  // Facade panels
  ctx.fillStyle = '#22223a';
  for (let py = by + 10; py < GROUND_Y; py += 40) {
    ctx.fillRect(bx + 8, py, bw - 16, 28);
  }

  // Flat roof
  ctx.fillStyle = '#0d0d1e';
  ctx.fillRect(bx - 10, by - 8, bw + 20, 14);

  // Rooftop AC units
  ctx.fillStyle = '#2a2a44';
  ctx.fillRect(bx + 20, by - 22, 35, 18);
  ctx.fillRect(bx + bw - 55, by - 22, 35, 18);
  // AC vents
  ctx.fillStyle = '#444466';
  for (let v = 0; v < 5; v++) {
    ctx.fillRect(bx + 22 + v * 6, by - 20, 4, 14);
    ctx.fillRect(bx + bw - 53 + v * 6, by - 20, 4, 14);
  }

  // Big storefront windows (lit cyan)
  const winFlicker = 0.9 + 0.1 * Math.sin(Date.now() * 0.002);
  ctx.fillStyle = `rgba(0, 220, 255, ${winFlicker * 0.25})`;
  ctx.fillRect(bx + 10, by + 20, bw - 20, 80);
  ctx.strokeStyle = `rgba(0, 220, 255, ${winFlicker * 0.8})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx + 10, by + 20, bw - 20, 80);

  // Window grid
  ctx.strokeStyle = `rgba(0, 180, 220, 0.4)`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let gx = bx + 10; gx <= bx + bw - 10; gx += 40) {
    ctx.moveTo(gx, by + 20); ctx.lineTo(gx, by + 100);
  }
  ctx.moveTo(bx + 10, by + 60); ctx.lineTo(bx + bw - 10, by + 60);
  ctx.stroke();

  // Automatic doors
  const doorW = 60;
  ctx.fillStyle = `rgba(0, 200, 255, 0.15)`;
  ctx.fillRect(bx + bw / 2 - doorW / 2, GROUND_Y - 90, doorW, 90);
  ctx.strokeStyle = `rgba(0, 200, 255, 0.7)`;
  ctx.lineWidth = 2;
  ctx.strokeRect(bx + bw / 2 - doorW / 2, GROUND_Y - 90, doorW / 2, 90);
  ctx.strokeRect(bx + bw / 2, GROUND_Y - 90, doorW / 2, 90);

  // NEON SIGN – main
  const pulse = 0.75 + 0.25 * Math.sin(Date.now() * 0.006);
  ctx.save();
  ctx.shadowColor = '#00ffee';
  ctx.shadowBlur  = 18 * pulse;
  ctx.fillStyle   = `rgba(0, 255, 238, ${pulse})`;
  ctx.fillRect(bx + 15, by + 6, bw - 30, 22);
  ctx.fillStyle = '#001a18';
  ctx.font = 'bold 13px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('SUPER MERCADO', bx + bw / 2, by + 22);
  ctx.restore();

  // Side neon strips
  const p2 = 0.6 + 0.4 * Math.sin(Date.now() * 0.004 + 1);
  ctx.save();
  ctx.shadowColor = '#ff00aa';
  ctx.shadowBlur  = 12 * p2;
  ctx.fillStyle   = `rgba(255, 0, 170, ${p2})`;
  ctx.fillRect(bx, by, 5, bh);
  ctx.fillRect(bx + bw - 5, by, 5, bh);
  ctx.restore();

  // Street-level lights
  drawStreetLight(bx - 15, GROUND_Y);
  drawStreetLight(bx + bw + 5, GROUND_Y);
}

function drawStreetLight(x, groundY) {
  // Pole
  ctx.fillStyle = '#3a3a5e';
  ctx.fillRect(x - 3, groundY - 120, 6, 120);
  // Arm
  ctx.fillStyle = '#3a3a5e';
  ctx.fillRect(x - 3, groundY - 120, 28, 5);
  // Lamp housing
  ctx.fillStyle = '#555577';
  ctx.fillRect(x + 18, groundY - 130, 20, 15);
  // Light glow
  const glow = 0.7 + 0.3 * Math.sin(Date.now() * 0.003 + x);
  ctx.save();
  ctx.shadowColor = '#ffeeaa';
  ctx.shadowBlur  = 20 * glow;
  ctx.fillStyle   = `rgba(255, 230, 120, ${glow})`;
  ctx.fillRect(x + 20, groundY - 128, 16, 10);
  // Cone of light
  ctx.globalAlpha = glow * 0.12;
  ctx.fillStyle   = '#ffeeaa';
  ctx.beginPath();
  ctx.moveTo(x + 28, groundY - 118);
  ctx.lineTo(x - 20, groundY);
  ctx.lineTo(x + 75, groundY);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}


// ─────────────────────────────────────────────────────────
//  DRAW – COINS
// ─────────────────────────────────────────────────────────
function drawCoins() {
  const t = Date.now() * 0.004;
  for (const c of coins) {
    if (c.collected) continue;
    const sx = c.wx - worldX;
    if (sx < -30 || sx > W + 30) continue;
    const bob = Math.sin(t + c.wx * 0.01) * 4;

    ctx.save();
    ctx.shadowColor = '#ffee22';
    ctx.shadowBlur  = 8;
    ctx.fillStyle   = '#ffcc00';
    ctx.beginPath();
    ctx.arc(sx, c.y + bob, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffe855';
    ctx.beginPath();
    ctx.arc(sx - 2, c.y + bob - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW – PLAYER
// ─────────────────────────────────────────────────────────
function drawPlayer() {
  if (PL.invincible > 0 && Math.floor(PL.invincible * 12) % 2 === 0) return;

  ctx.save();

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(PLAYER_X + PL.width / 2, GROUND_Y + 4, 22, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  const SCALE = 2.2;
  const suffix = PL.frame + 1;
  const key    = PL.anim + suffix;
  const img    = IMG[key];

  if (img && img.complete && img.naturalWidth > 0) {
    const dw = img.naturalWidth  * SCALE;
    const dh = img.naturalHeight * SCALE;
    const cx = PLAYER_X + PL.width / 2;
    const dy = PL.y + PL.height - dh;
    if (PL.facingLeft) {
      ctx.scale(-1, 1);
      ctx.drawImage(img, -cx - dw / 2, dy, dw, dh);
    } else {
      ctx.drawImage(img, cx - dw / 2, dy, dw, dh);
    }
  } else {
    ctx.fillStyle = '#ff6688';
    ctx.fillRect(PLAYER_X, PL.y, PL.width, PL.height);
    ctx.fillStyle = '#ffaacc';
    ctx.fillRect(PLAYER_X + 8, PL.y + 4, 22, 22);
  }

  ctx.restore();
}

// ─────────────────────────────────────────────────────────
//  DRAW – ENEMIES
// ─────────────────────────────────────────────────────────
function drawEnemies() {
  for (const en of enemies) {
    const esx = en.wx - worldX;
    if (esx > W + 80 || esx < -80) continue;

    ctx.save();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(esx + en.w / 2, GROUND_Y + 4, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    const SCALE = 1.9;
    const imgKey = `${en.type}${en.frame + 1}`;
    const img    = IMG[imgKey];
    if (img && img.complete && img.naturalWidth > 0) {
      const dw = img.naturalWidth  * SCALE;
      const dh = img.naturalHeight * SCALE;
      ctx.drawImage(img, esx + en.w / 2 - dw / 2, en.y + en.h - dh, dw, dh);
    } else {
      ctx.fillStyle = en.type === 'cop' ? '#0044ff' : '#ff4400';
      ctx.fillRect(esx, en.y, en.w, en.h);
    }
    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────
//  DRAW – BOSS (fase 3)
// ─────────────────────────────────────────────────────────
function drawBoss() {
  if (!boss) return;

  const bsx = boss.wx - worldX;
  if (bsx > W + 150 || bsx < -200) return;

  ctx.save();

  if (boss.dead) {
    // Desaparece gradualmente
    ctx.globalAlpha = Math.max(0, boss.deathTimer / 1.8);
  } else if (boss.hurtFlash > 0) {
    // Flash vermelho ao levar dano
    ctx.filter = 'brightness(3) sepia(1) hue-rotate(-20deg)';
  }

  const SCALE = 3.2;
  const suffix = boss.frame + 1;
  const key = boss.anim === 'idle' ? `bossIdle${suffix}` : `bossBreath${suffix}`;
  const img = IMG[key];

  if (img && img.complete && img.naturalWidth > 0) {
    const dw = img.naturalWidth  * SCALE;
    const dh = img.naturalHeight * SCALE;
    // Boss faces left (flip horizontally)
    ctx.scale(-1, 1);
    ctx.drawImage(img, -(bsx + boss.w / 2) - dw / 2, GROUND_Y - dh, dw, dh);
  } else {
    // Fallback box vermelho
    ctx.fillStyle = '#cc2200';
    ctx.fillRect(bsx, boss.y, boss.w, boss.h);
    ctx.fillStyle = '#ff4400';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('👹', bsx + boss.w / 2, boss.y + boss.h / 2);
  }

  ctx.restore();

  // HP Bar
  if (!boss.dead) {
    const barW = 120, barH = 10;
    const barX = bsx + boss.w / 2 - barW / 2;
    const barY = boss.y - 18;
    ctx.fillStyle = '#330000';
    ctx.fillRect(barX, barY, barW, barH);
    const hpPct = boss.hp / boss.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#ff4400' : hpPct > 0.25 ? '#ff8800' : '#ffcc00';
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    ctx.strokeStyle = '#cc2200';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
  }
}

function drawBossFireballs() {
  if (!boss) return;
  for (const fb of boss.fireballs) {
    const fsx = fb.wx - worldX;
    if (fsx > W + 60 || fsx < -60) continue;

    const SCALE = 2.0;
    const key = `bossFire${fb.frame + 1}`;
    const img = IMG[key];

    ctx.save();
    // Glow laranja
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur  = 14;
    if (img && img.complete && img.naturalWidth > 0) {
      const dw = img.naturalWidth  * SCALE;
      const dh = img.naturalHeight * SCALE;
      ctx.drawImage(img, fsx - dw / 2, fb.y - dh / 2, dw, dh);
    } else {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(fsx, fb.y, 14, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawBossHUD() {
  if (!boss || boss.dead) return;

  const barW = 260, barH = 18;
  const barX = W / 2 - barW / 2;
  const barY = H - 44;

  // Fundo
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(barX - 8, barY - 6, barW + 16, barH + 14);

  // Label
  ctx.fillStyle = '#ff4400';
  ctx.font = 'bold 11px "Courier New"';
  ctx.textAlign = 'center';
  const bossLabel = boss.hurtFlash > 0 ? '💥 CHEFE FERIDO!' : '☠ GERENTE MALIGNO';
  ctx.fillText(bossLabel, W / 2, barY - 1);

  // Barra HP boss
  ctx.fillStyle = '#330000';
  ctx.fillRect(barX, barY + 5, barW, barH);

  const hpPct = Math.max(0, boss.hp / boss.maxHp);
  const hpColor = hpPct > 0.5 ? '#ff2200' : hpPct > 0.25 ? '#ff8800' : '#ffee00';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY + 5, barW * hpPct, barH);

  // Segmentos
  ctx.strokeStyle = '#550000';
  ctx.lineWidth = 1;
  for (let i = 1; i < boss.maxHp; i++) {
    const sx = barX + (barW / boss.maxHp) * i;
    ctx.beginPath(); ctx.moveTo(sx, barY + 5); ctx.lineTo(sx, barY + 5 + barH); ctx.stroke();
  }

  ctx.strokeStyle = '#cc2200';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY + 5, barW, barH);

  // Corações (HP do boss)
  ctx.fillStyle = '#ff4400';
  ctx.font = '12px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(`${'♦ '.repeat(boss.hp).trim()}`, W / 2, barY + 20);
}

// ─────────────────────────────────────────────────────────
//  DRAW – PARTICLES
// ─────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─────────────────────────────────────────────────────────
//  DRAW – HUD
// ─────────────────────────────────────────────────────────
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, 38);

  // Timer
  ctx.fillStyle = '#ffee44';
  ctx.font = 'bold 17px "Courier New"';
  ctx.textAlign = 'left';
  ctx.fillText(`FASE ${phase}  ${timer.toFixed(1)}s`, 10, 24);

  // Score
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 15px "Courier New"';
  ctx.fillText(`★ ${score}`, 200, 24);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff4488';
  ctx.font = 'bold 18px "Courier New"';
  ctx.fillText('♥ '.repeat(lives), W - 10, 24);

  // Progress bar
  const pct    = Math.min(worldX / curWorldLen, 1);
  const barX   = W / 2 - 160;
  const barW   = 320;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX, 8, barW, 14);

  const barGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  barGrad.addColorStop(0, '#00ffee');
  barGrad.addColorStop(1, '#ff00aa');
  ctx.fillStyle = barGrad;
  ctx.fillRect(barX, 8, barW * pct, 14);

  ctx.strokeStyle = '#7a4a9e';
  ctx.lineWidth   = 1;
  ctx.strokeRect(barX, 8, barW, 14);

  // Market icon on bar
  ctx.fillStyle = '#ffcc00';
  ctx.font      = '11px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('[MERCADO]', barX + barW + 40, 20);
}

// ─────────────────────────────────────────────────────────
//  DRAW – SCREENS
// ─────────────────────────────────────────────────────────

// Rects dos botões de dificuldade (para detecção de clique)
const DIFF_RECTS = [];

function drawDifficulty() {
  ctx.fillStyle = 'rgba(5,0,20,0.88)';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#00ffee';
  ctx.lineWidth   = 3;
  ctx.strokeRect(20, 20, W - 40, H - 40);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font      = 'bold 32px "Courier New"';
  ctx.fillText('ESCOLHA A DIFICULDADE', W / 2, 90);

  ctx.fillStyle = '#aaaaff';
  ctx.font      = '13px "Courier New"';
  ctx.fillText('↑ ↓ para navegar   ENTER ou CLIQUE para confirmar', W / 2, 118);

  DIFF_RECTS.length = 0;
  const bw = 320, bh = 64, bx = W / 2 - bw / 2;
  const startY = 148;

  DIFF_OPTIONS.forEach((opt, i) => {
    const by = startY + i * (bh + 14);
    DIFF_RECTS.push({ x: bx, y: by, w: bw, h: bh, idx: i });

    const selected = i === selectedDiff;

    // Fundo do botão
    ctx.fillStyle = selected ? opt.color + '33' : 'rgba(0,0,0,0.4)';
    ctx.fillRect(bx, by, bw, bh);

    // Borda
    ctx.strokeStyle = selected ? opt.color : '#444466';
    ctx.lineWidth   = selected ? 3 : 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Seta de seleção
    if (selected) {
      ctx.fillStyle = opt.color;
      ctx.font      = 'bold 22px "Courier New"';
      ctx.textAlign = 'left';
      ctx.fillText('▶', bx + 12, by + bh / 2 + 8);
    }

    // Label
    ctx.fillStyle = selected ? opt.color : '#aaaaaa';
    ctx.font      = `bold ${selected ? 24 : 20}px "Courier New"`;
    ctx.textAlign = 'center';
    ctx.fillText(opt.label, W / 2, by + 26);

    // Vidas
    ctx.font      = `${selected ? 15 : 13}px "Courier New"`;
    ctx.fillStyle = selected ? '#ffffff' : '#888888';
    ctx.fillText(`${'♥ '.repeat(opt.lives).trim()}  (${opt.lives} vidas)`, W / 2, by + 50);
  });

  if (bestTime) {
    ctx.fillStyle = '#ffcc00';
    ctx.font      = '14px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(`★ Recorde: ${bestTime.toFixed(1)}s`, W / 2, H - 40);
  }
}

function drawTitle() {
  ctx.fillStyle = 'rgba(5,0,20,0.82)';
  ctx.fillRect(0, 0, W, H);

  // Decorative border
  ctx.strokeStyle = '#7a3aae';
  ctx.lineWidth   = 3;
  ctx.strokeRect(20, 20, W - 40, H - 40);
  ctx.strokeStyle = '#3a1a5e';
  ctx.lineWidth   = 1;
  ctx.strokeRect(25, 25, W - 50, H - 50);

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#ffcc00';
  ctx.font      = 'bold 42px "Courier New"';
  ctx.fillText('VICENTE', W / 2, H / 2 - 75);

  ctx.fillStyle = '#aa66ff';
  ctx.font      = 'bold 28px "Courier New"';
  ctx.fillText('VAI AO MERCADO', W / 2, H / 2 - 32);

  // Divider
  ctx.fillStyle = '#5a2a8e';
  ctx.fillRect(W / 2 - 140, H / 2 - 18, 280, 2);

  ctx.fillStyle = '#ccaaff';
  ctx.font      = '15px "Courier New"';
  ctx.fillText('Ajude Vicente a chegar no supermercado! 🛒', W / 2, H / 2 + 8);
  ctx.fillText('← → ou A D para andar    ↑ / ESPAÇO para pular', W / 2, H / 2 + 30);
  ctx.fillText('Desvie dos punks e não caia nos buracos.', W / 2, H / 2 + 55);

  if (bestTime) {
    ctx.fillStyle = '#ffcc00';
    ctx.font      = 'bold 15px "Courier New"';
    ctx.fillText(`★ Recorde: ${bestTime.toFixed(1)}s`, W / 2, H / 2 + 85);
  }

  // Blink start
  if (Math.floor(Date.now() / 550) % 2) {
    ctx.fillStyle = '#ffffff';
    ctx.font      = 'bold 18px "Courier New"';
    ctx.fillText('── ENTER ou CLIQUE para começar ──', W / 2, H / 2 + 115);
  }
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4488';
  ctx.font      = 'bold 44px "Courier New"';
  ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

  if (lives > 0) {
    ctx.fillStyle = '#ffffff';
    ctx.font      = '20px "Courier New"';
    ctx.fillText(`Vidas restantes: ${'♥ '.repeat(lives)}`, W / 2, H / 2 - 10);

    if (Math.floor(Date.now() / 550) % 2) {
      ctx.fillStyle = '#aaaaff';
      ctx.font      = '17px "Courier New"';
      ctx.fillText('ENTER ou CLIQUE para continuar', W / 2, H / 2 + 30);
    }
  } else {
    ctx.fillStyle = '#aa66ff';
    ctx.font      = '18px "Courier New"';
    ctx.fillText('Sem vidas! Tente de novo.', W / 2, H / 2 - 10);

    if (Math.floor(Date.now() / 550) % 2) {
      ctx.fillStyle = '#aaaaff';
      ctx.font      = '17px "Courier New"';
      ctx.fillText('ENTER ou CLIQUE para recomeçar', W / 2, H / 2 + 30);
    }
  }
}

function drawPhaseClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.strokeStyle = '#00ffee';
  ctx.lineWidth   = 3;
  ctx.strokeRect(30, 30, W - 60, H - 60);

  ctx.fillStyle = '#00ffee';
  ctx.font      = 'bold 40px "Courier New"';
  ctx.fillText('FASE 1 COMPLETA!', W / 2, H / 2 - 60);

  ctx.fillStyle = '#ffcc00';
  ctx.font      = '22px "Courier New"';
  ctx.fillText(`Tempo: ${phase1Time.toFixed(1)}s`, W / 2, H / 2 - 10);

  ctx.fillStyle = '#ff4488';
  ctx.font      = 'bold 20px "Courier New"';
  ctx.fillText('FASE 2 — CIDADE PROIBIDA', W / 2, H / 2 + 30);
  ctx.fillStyle = '#ccaaff';
  ctx.font      = '15px "Courier New"';
  ctx.fillText('Cuidado: policiais mais rápidos!', W / 2, H / 2 + 58);

  if (Math.floor(Date.now() / 550) % 2) {
    ctx.fillStyle = '#ffffff';
    ctx.font      = '16px "Courier New"';
    ctx.fillText('ENTER ou CLIQUE para continuar', W / 2, H / 2 + 90);
  }
}

function drawPhase2Clear() {
  ctx.fillStyle = 'rgba(0,0,0,0.80)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth   = 3;
  ctx.strokeRect(30, 30, W - 60, H - 60);

  ctx.fillStyle = '#ff8800';
  ctx.font      = 'bold 38px "Courier New"';
  ctx.fillText('FASE 2 COMPLETA!', W / 2, H / 2 - 70);

  ctx.fillStyle = '#ffcc00';
  ctx.font      = '20px "Courier New"';
  ctx.fillText(`Fase 1: ${phase1Time.toFixed(1)}s  |  Fase 2: ${phase2Time.toFixed(1)}s`, W / 2, H / 2 - 22);

  ctx.fillStyle = '#cc44ff';
  ctx.font      = 'bold 22px "Courier New"';
  ctx.fillText('FASE 3 — O GERENTE MALIGNO', W / 2, H / 2 + 20);

  ctx.fillStyle = '#ff6666';
  ctx.font      = '15px "Courier New"';
  ctx.fillText('Pule na cabeça do chefe para derrotá-lo!', W / 2, H / 2 + 50);
  ctx.fillStyle = '#ffaaaa';
  ctx.fillText('Desvie das bolas de fogo!', W / 2, H / 2 + 72);

  if (Math.floor(Date.now() / 550) % 2) {
    ctx.fillStyle = '#ffffff';
    ctx.font      = '16px "Courier New"';
    ctx.fillText('ENTER ou CLIQUE para continuar', W / 2, H / 2 + 105);
  }
}

function drawWin() {
  const finalTime = phase1Time + phase2Time + timer;

  ctx.fillStyle = 'rgba(5,0,10,0.92)';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth   = 3;
  ctx.strokeRect(30, 30, W - 60, H - 60);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc00';
  ctx.font      = 'bold 30px "Courier New"';
  ctx.fillText('★ VICENTE CHEGOU! ★', W / 2, H / 2 - 98);

  ctx.fillStyle = '#ccaaff';
  ctx.font      = '13px "Courier New"';
  ctx.fillText('O Gerente Maligno foi derrotado!', W / 2, H / 2 - 70);

  const rows = [
    ['Fase 1 (Rua):', phase1Time.toFixed(1) + 's'],
    ['Fase 2 (Cidade):', phase2Time.toFixed(1) + 's'],
    ['Fase 3 (Chefe):', timer.toFixed(1) + 's'],
  ];
  rows.forEach(([label, val], i) => {
    const ry = H / 2 - 42 + i * 26;
    ctx.fillStyle = '#aaaaff';
    ctx.font = '15px "Courier New"';
    ctx.textAlign = 'left';
    ctx.fillText(label, W / 2 - 130, ry);
    ctx.fillStyle = '#44ff88';
    ctx.textAlign = 'right';
    ctx.fillText(val, W / 2 + 130, ry);
  });

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font      = 'bold 22px "Courier New"';
  ctx.fillText(`Total: ${finalTime.toFixed(1)}s`, W / 2, H / 2 + 46);

  if (score > 0) {
    ctx.fillStyle = '#ffee44';
    ctx.font      = '14px "Courier New"';
    ctx.fillText(`★ Moedas: ${score}`, W / 2, H / 2 + 70);
  }

  if (bestTime !== null) {
    const isRecord = Math.abs(finalTime - bestTime) < 0.05;
    ctx.fillStyle = isRecord ? '#ffcc00' : '#ccaaff';
    ctx.font      = isRecord ? 'bold 16px "Courier New"' : '14px "Courier New"';
    ctx.fillText(isRecord ? '★ NOVO RECORDE! ★' : `Recorde: ${bestTime.toFixed(1)}s`, W / 2, H / 2 + 92);
  }

  if (Math.floor(Date.now() / 550) % 2) {
    ctx.fillStyle = '#aaaaff';
    ctx.font      = '15px "Courier New"';
    ctx.fillText('ENTER ou CLIQUE para jogar de novo', W / 2, H / 2 + 116);
  }
}

// ─────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────
let last = 0;

function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  ctx.clearRect(0, 0, W, H);

  if (state === 'loading') {
    ctx.fillStyle = '#0d0014';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#7a4aae';
    ctx.font      = '20px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText(`Carregando sprites... ${loaded}/${total}`, W / 2, H / 2);

    // Progress bar
    ctx.fillStyle = '#2a1040';
    ctx.fillRect(W / 2 - 150, H / 2 + 20, 300, 14);
    ctx.fillStyle = '#7a4aae';
    ctx.fillRect(W / 2 - 150, H / 2 + 20, 300 * (loaded / total), 14);

    if (loaded >= total) state = 'title';
  } else {
    // Always draw world
    drawBackground();
    drawCoins();
    drawGround();

    const marketSx = curWorldLen - worldX - 10;
    if (marketSx < W + 250) drawMarket(marketSx);

    drawPlayer();
    drawEnemies();
    drawBoss();
    drawBossFireballs();
    drawParticles();

    update(dt);

    if (state === 'playing') { drawHUD(); if (phase === 3) drawBossHUD(); }
    if (state === 'title')        drawTitle();
    if (state === 'difficulty')   drawDifficulty();
    if (state === 'dead')         drawDead();
    if (state === 'phase_clear')  drawPhaseClear();
    if (state === 'phase2_clear') drawPhase2Clear();
    if (state === 'win')          drawWin();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

// ── Touch controls ──────────────────────────────────────────────
(function setupTouchControls() {
  function hold(btn, downFn, upFn) {
    btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('pressed'); downFn(); }, { passive: false });
    btn.addEventListener('touchend',   e => { e.preventDefault(); btn.classList.remove('pressed'); upFn(); }, { passive: false });
    btn.addEventListener('touchcancel',e => { e.preventDefault(); btn.classList.remove('pressed'); upFn(); }, { passive: false });
  }
  hold(
    document.getElementById('btn-left'),
    () => { KEYS['ArrowLeft']  = true;  },
    () => { KEYS['ArrowLeft']  = false; }
  );
  hold(
    document.getElementById('btn-right'),
    () => { KEYS['ArrowRight'] = true;  },
    () => { KEYS['ArrowRight'] = false; }
  );
  const btnJump = document.getElementById('btn-jump');
  btnJump.addEventListener('touchstart', e => {
    e.preventDefault();
    btnJump.classList.add('pressed');
    onJumpPress();
    onAction();
  }, { passive: false });
  btnJump.addEventListener('touchend',   e => { e.preventDefault(); btnJump.classList.remove('pressed'); }, { passive: false });
  btnJump.addEventListener('touchcancel',e => { e.preventDefault(); btnJump.classList.remove('pressed'); }, { passive: false });

  // Prevent canvas scroll/zoom on touch
  canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
})();
</script>
